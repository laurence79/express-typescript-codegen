openapi: 3.1.0
info:
  title: Shared Models
  version: 0.1.0
paths: {}
components:
  schemas:
    Address:
      title: Address
      type: object
      properties:
        line1: { type: string }
        city: { type: string }

    Company:
      title: Company
      type: object
      properties:
        name: { type: string }
        address:
          $ref: '#/components/schemas/Address'
        status:
          $ref: '#/components/schemas/CompanyStatus'

    CompanyStatus:
      title: CompanyStatus
      type: string
      enum: [PENDING, APPROVED, REJECTED]

    CompanyList:
      title: CompanyList
      type: array
      items:
        $ref: '#/components/schemas/Company'

    Thing:
      title: Thing
      type: object
      properties:
        id: { type: string }
        name: { type: string }
